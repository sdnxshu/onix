# .jennings/workflows/build.yaml
#
# This file lives in your repo at .jennings/workflows/
# Jennings picks it up automatically.

name: Build & Test

# Docker image all steps run inside
image: oven/bun:alpine

steps:
  - name: Install dependencies
    run: bun install

  - name: Lint
    run: bun run lint

  - name: Build
    run: bun run build

  - name: Run
    run: bun run dev